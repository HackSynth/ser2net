name: Build CentOS 7 Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build in CentOS 7 container
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ser2net-centos7
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GENSIO_VERSION=v2.8.4
          dockerfile: Dockerfile.centos7

      - name: Extract binary
        run: |
          docker create --name ser2net ser2net-centos7:latest
          docker cp ser2net:/root/485/ser2net/ser2net ./ser2net
          docker cp ser2net:/root/485/ser2net/ser2netconf ./ser2netconf
          docker rm ser2net
          tar -czvf ser2net-centos7.tar.gz ser2net ser2netconf

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ser2net-centos7.tar.gz
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
